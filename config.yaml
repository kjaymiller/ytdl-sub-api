# ytdl-sub config — passed to every run via `--config /config/config.yaml`.
# Both the ofelia cron and the API's POST /run use this file.
#
# Default ships a single `configuration:` block with no custom presets.
# To define your own presets (retention profiles, tag presets, etc.),
# add them under a top-level `presets:` key here. See:
#   https://ytdl-sub.readthedocs.io/en/latest/config_reference/index.html
#
# Example — retention "profiles" extending the prebuilt `Only Recent`:
#
#   presets:
#     daily:
#       preset:
#         - "Only Recent"
#       overrides:
#         only_recent_date_range: "7days"
#         only_recent_max_files: 4
#     long_collection:
#       preset:
#         - "Only Recent"
#       overrides:
#         only_recent_date_range: "365days"
#         only_recent_max_files: 24
#
# Then in subscriptions.yaml use chained-preset key syntax:
#   "Jellyfin TV Show by Date | long_collection":
#     "@SomeChannel": "https://www.youtube.com/@SomeChannel"

configuration:
  working_directory: ".ytdl-sub-working-directory"
