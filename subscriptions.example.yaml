# ytdl-sub subscriptions file. This is the source of truth for what
# gets downloaded. The API will mutate this file on POST/DELETE; keep
# it checked into your own deployment repo (or a volume) so changes
# survive container restarts.
#
# Preset `Jellyfin TV Show` lays files out as:
#   /downloads/{channel}/Season {year}/s{year}e{episode} - {title}.{ext}
# with NFO sidecars — works well with Jellyfin, Plex, ErsatzTV.
#
# Per-subscription retention knobs:
#   only_recent_date_range: "14days"
#   only_recent_max_files: 10
# Files aged out are removed on the next run.

__preset__:
  overrides:
    tv_show_directory: "/downloads"
  output_options:
    keep_files_after: "30days"

Jellyfin TV Show:
  # Simple form — just a URL. Use this when no per-channel retention
  # tweaks are needed (defaults come from the preset chain).
  # "Example Channel": "https://www.youtube.com/@exampleChannel"

  # Full form — `url` MUST live inside `overrides:`. ytdl-sub rejects
  # a top-level `url:` field at this level with "Allowed fields:
  # ... overrides, preset, ...".
  # "Example Channel":
  #   overrides:
  #     url: "https://www.youtube.com/@exampleChannel"
  #     only_recent_date_range: "14days"
  #     only_recent_max_files: 10
